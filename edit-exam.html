<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Edit Exam - Alon Kreisberger</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-light">

    <div class="container py-5">
        <h1 class="text-center mb-4">Edit Exam</h1>

        <div class="card mx-auto" style="max-width: 700px;">
            <div class="card-body p-4">

                <div class="mb-3">
                    <label class="form-label text-muted">Exam Title</label>
                    <input id="editExamTitle" type="text" class="form-control form-control-lg">
                </div>

                <div class="mb-3">
                    <label class="form-label text-muted">Description</label>
                    <textarea id="editExamDescription" class="form-control" rows="2"
                        placeholder="Brief description of the exam..."></textarea>
                </div>

                <div class="row mb-4">
                    <div class="col-md-4 mb-2">
                        <label class="form-label text-muted">Category</label>
                        <input type="text" id="editExamCategory" class="form-control" placeholder="e.g., Math">
                    </div>
                    <div class="col-md-4 mb-2">
                        <label class="form-label text-muted">Exam Code</label>
                        <input type="text" id="editExamCode" class="form-control" placeholder="e.g., MAT101">
                    </div>
                    <div class="col-md-4 mb-2">
                        <label class="form-label text-muted">Time Limit (Min)</label>
                        <input type="number" id="editExamTime" class="form-control" min="0" placeholder="0 = unlimited">
                    </div>
                </div>
                <div id="editQuestionsList" class="mb-4">
                </div>

                <div class="mb-4 text-center">
                    <button id="addNewQuestionBtn" class="btn btn-outline-primary">+ Add New Question</button>
                </div>

                <div class="d-grid gap-2">
                    <button id="saveChangesBtn" class="btn btn-success btn-lg">Save Changes</button>
                    <a href="teacher.html" class="btn btn-outline-secondary">Cancel</a>
                </div>

                <div id="editMessage" class="mt-3 text-center"></div>

            </div>
        </div>
    </div>

    <script type="module" src="js/edit-exam.js"></script>
</body>

</html>
